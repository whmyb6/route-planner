<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气+路径规划</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #fff3e0 50%, #f3e5f5 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 700px; width: 100%; text-align: center;
            background: rgba(255,255,255,0.95); border-radius: 20px;
            padding: 3rem 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2.2rem; color: #333; margin-bottom: 0.5rem; }
        .subtitle { color: #888; font-size: 1rem; margin-bottom: 2.5rem; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .service-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 2.5rem 1.5rem; border-radius: 16px;
            text-decoration: none; transition: all 0.3s;
            border: 2px solid #eee; background: #fafafa;
        }
        .service-card:hover {
            transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .service-card.weather { border-color: #ffcdd2; }
        .service-card.weather:hover { background: #fff5f5; border-color: #e74c3c; }
        .service-card.route { border-color: #bbdefb; }
        .service-card.route:hover { background: #f0f8ff; border-color: #1e88e5; }
        .service-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .service-name { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 0.3rem; }
        .service-desc { font-size: 0.85rem; color: #888; }
        .service-badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
            font-size: 0.75rem; margin-top: 0.5rem;
        }
        .badge-weather { background: #ffebee; color: #c62828; }
        .badge-route { background: #e3f2fd; color: #1565c0; }
        @media (max-width: 500px) {
            .card-grid { grid-template-columns: 1fr; }
            .container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌤 天气 & 路径规划</h1>
    <p class="subtitle">选择一个服务开始使用</p>
    <div class="card-grid">
        <a href="/weather" class="service-card weather">
            <div class="service-icon">🌤</div>
            <div class="service-name">天气预报</div>
            <div class="service-desc">实时天气、逐小时预报、折线图、10天预报</div>
            <span class="service-badge badge-weather">快速查询</span>
        </a>
        <a href="/route" class="service-card route">
            <div class="service-icon">🗺</div>
            <div class="service-name">路径规划</div>
            <div class="service-desc">A*/BFS/DFS 网格寻路、起点终点障碍物设置</div>
            <span class="service-badge badge-route">交互寻路</span>
        </a>
    </div>
</div>
</body>
</html>
